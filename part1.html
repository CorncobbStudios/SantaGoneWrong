<!doctype html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8" />
    <title>Making your first Phaser 3 Game</title>
    <script src="//cdn.jsdelivr.net/npm/phaser@3.11.0/dist/phaser.js"></script>
    <style type="text/css">
        body {
            margin: 0;
        }
    </style>
</head>
<body>

<script type="text/javascript">

    var config = {
        type: Phaser.AUTO,
        width: 800,
        height: 600,
        render:{
            pixelArt: true
        },
        physics: {
            default: 'arcade',
            arcade: {
                gravity: { y: 300 },
                debug: false
            }
        },
        scene: {
            preload: preload,
            create: create,
            update: update
        }
    };

    var player;
    var stars;
    var bombs;
    var platforms;
    var cursors;
    var score = 0;
    var gameOver = false;
    var scoreText;

    var game = new Phaser.Game(config);

    function preload ()
    {
        this.load.image('sky', 'assets/sky.png');
        this.load.image('ground', 'assets/platform.png');
        this.load.image('star', 'assets/star.png');
        this.load.image('bomb', 'assets/bomb.png');
        this.load.spritesheet('kasey', 'assets/kaseyspritesheet.png', { frameWidth: 64, frameHeight: 64});
        
    }

    function create ()
    {
        this.add.image(400, 300, 'sky');

        platforms = this.physics.add.staticGroup();

        platforms.create(400, 568, 'ground').setScale(2).refreshBody();

        platforms.create(600, 400, 'ground');
        platforms.create(50, 250, 'ground');
        platforms.create(750, 220, 'ground');

        player = this.physics.add.sprite(100, 450, 'kasey');
        this.textures.get('kasey').setFilter(Phaser.Textures.FilterMode.NEAREST);
    
        player.setBounce(0.2);
        
        player.setCollideWorldBounds(true);
        player.body.setSize(34, 50);
        player.body.setOffset(15, 8);

this.anims.create({
    key: 'idle',
    frames: this.anims.generateFrameNumbers('kasey', {
        start: 0,
        end: 5
    }),
    frameRate: 6,
    repeat: -1
});

this.anims.create({
    key: 'run',
    frames: this.anims.generateFrameNumbers('kasey', {
        start: 6,
        end: 13
    }),
    frameRate: 12,
    repeat: -1
});

this.anims.create({
    key: 'jump',
    frames: this.anims.generateFrameNumbers('kasey', {
        start: 15,
        end: 19
    }),
    frameRate: 1,
    repeat: 0
});


        cursors = this.input.keyboard.createCursorKeys();

        stars = this.physics.add.group({
            key: 'star',
            repeat: 11,
            setXY: { x: 12, y: 0, stepX: 70 }
        });

        stars.children.iterate(function (child) {

            child.setBounceY(Phaser.Math.FloatBetween(0.4, 0.8));

        });

        bombs = this.physics.add.group();

        //  The score
        scoreText = this.add.text(16, 16, 'score: 0', { fontSize: '32px', fill: '#000' });

        //  Collide the player and the stars with the platforms
        this.physics.add.collider(player, platforms);
        this.physics.add.collider(stars, platforms);
        this.physics.add.collider(bombs, platforms);

        //  Checks to see if the player overlaps with any of the stars, if he does call the collectStar function
        this.physics.add.overlap(player, stars, collectStar, null, this);

        this.physics.add.collider(player, bombs, hitBomb, null, this);
    }

function update ()
{
    if (gameOver)
    {
        return;
    }

    var onGround = player.body.blocked.down || player.body.touching.down;

    // Horizontal movement
    if (cursors.left.isDown) {
        player.setVelocityX(-160);
        player.setFlipX(true);
    }
    else if (cursors.right.isDown) {
        player.setVelocityX(160);
        player.setFlipX(false);
    }
    else {
        player.setVelocityX(0);
    }

    // Jump only when on ground
    if (Phaser.Input.Keyboard.JustDown(cursors.up) && onGround) {
        player.setVelocityY(-330);
        player.anims.play('jump', true);
        return;
    }

    // Do not overwrite jump animation while airborne
    if (!onGround) {
        return;
    }

    // Ground animations
    if (cursors.left.isDown || cursors.right.isDown) {
        if (player.anims.currentAnim?.key !== 'run') {
            player.anims.play('run');
        }
    }
    else {
        if (player.anims.currentAnim?.key !== 'idle') {
            player.anims.play('idle');
        }
    }
}
    
    function collectStar (player, star)
    {
        star.disableBody(true, true);

        //  Add and update the score
        score += 10;
        scoreText.setText('Score: ' + score);

        if (stars.countActive(true) === 0)
        {
            //  A new batch of stars to collect
            stars.children.iterate(function (child) {
                child.enableBody(true, child.x, 0, true, true);
            });
            var x = (player.x < 400) ? Phaser.Math.Between(400, 800) : Phaser.Math.Between(0, 400);
            var bomb = bombs.create(x, 16, 'bomb');
                bomb.setBounce(1);
                bomb.setCollideWorldBounds(true);
                bomb.setVelocity(Phaser.Math.Between(-200, 200), 20);
                bomb.allowGravity = false;
        }
    }

    function hitBomb (player, bomb)
    {
        this.physics.pause();

        player.setTint(0xff0000);

        player.anims.play('turn');

        gameOver = true;
    }

</script>

</body>
</html>>
